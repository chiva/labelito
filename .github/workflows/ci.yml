name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  lock:
    name: Lockfile up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # Fails if uv.lock is out of sync with pyproject.toml (e.g. a version bump or dependency
      # change that forgot to re-lock). release-please bumps pyproject.toml but not the lockfile;
      # the release-please workflow re-locks on its PR branch, and this guard catches every other
      # source of drift.
      - run: uv lock --check

  type:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --group typing
      - name: mypy (blocking)
        run: uv run mypy app/
      - name: ty (advisory)
        run: uvx ty@0.0.1a14 check
        continue-on-error: true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core
      # uv resolves pre-release interpreters (e.g. 3.15) by version; if no build exists yet the step
      # fails, but continue-on-error keeps the experimental job from blocking the build.
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group test
      - name: Run tests
        # `icons` is excluded here: it needs the fetched icon collections (a build artifact absent
        # from a plain checkout) and runs in the dedicated `icons` job below, not the matrix.
        run: uv run pytest -m "not hardware and not icons" --cov --cov-report=xml --cov-fail-under=85
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  icons:
    name: Icon collections
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # Node + corepack pnpm mirror the Dockerfile `icons` build stage so the fetched layout matches.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - run: corepack enable
      # cairosvg rasterization shares the render stack, which needs the DejaVu fonts.
      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core
      - name: Fetch icon collections
        run: bash scripts/fetch-icons.sh
      - run: uv sync --group test
      - name: Verify icon collections
        run: uv run pytest -m icons -v

  e2e:
    name: E2E (browser + API)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # The harness's live uvicorn server renders real previews, so it needs the same fonts as
      # the test matrix.
      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core
      # `test` supplies httpx2 (the e2e api_client fixture); `e2e` supplies pytest-playwright
      # (an opt-in group — see dependency-groups in pyproject.toml).
      - run: uv sync --group test --group e2e
      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(uv run python -c "from importlib.metadata import version; print(version('playwright'))")" >> "$GITHUB_OUTPUT"
      # The chromium download is ~170 MB; cache it keyed on the playwright version so it is only
      # re-fetched when the dependency bumps.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      # On a cache hit the browser download is skipped; --with-deps still installs the system
      # libraries chromium needs on the runner.
      - name: Install Playwright chromium
        run: uv run playwright install --with-deps chromium
      - name: Run e2e suite
        run: uv run pytest --e2e -m e2e -q

  docker:
    name: Docker smoke test (${{ matrix.arch }})
    # arm64 is a primary deploy target (Home Assistant / Raspberry Pi), so smoke-test it on a native
    # arm64 hosted runner rather than trust that a successful emulated build in release-please also
    # boots and renders. Both legs build their own single-platform image natively — no QEMU.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # `buildkit` is build-push-action's default gha scope, so this leg shares the layer cache
          # with the release-please docker job's amd64 build (and vice versa).
          - arch: amd64
            runner: ubuntu-latest
            cache_scope: buildkit
          # A distinct scope keeps the two matrix legs (which run concurrently) from racing on the
          # same cache manifest. The release arm64 build is emulated and rarely runs, so it keeps its
          # own default scope and is intentionally not warmed from here.
          - arch: arm64
            runner: ubuntu-24.04-arm
            cache_scope: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      # Build the native-arch image with Buildx so it can read/write the shared GHA layer cache.
      # `load` imports the result into the runner's docker daemon so the smoke-test `docker run` below
      # can use it. cache-from/-to type=gha means this per-PR build reuses warm layers instead of
      # rebuilding from scratch every run.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: labelito:ci
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
      - name: Smoke test
        run: |
          docker run -d --name label-test \
            -e PRINTER_URI=file:///tmp/output.bin \
            -e API_TOKEN=ci-smoke-token \
            -p 8765:8765 \
            labelito:ci
          sleep 5
          curl --fail http://localhost:8765/health
          # /preview is auth-protected: exercise the production auth path with a Bearer token.
          curl --fail -X POST http://localhost:8765/preview \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ci-smoke-token" \
            -d '{"template":"simple-text","fields":{"text":"CI Smoke"}}' \
            --output /dev/null
          # Exercise the real (non-dry-run) send path in the built image: /print against the
          # file:// transport must write raster bytes to the sink, not just return 200.
          curl --fail -X POST http://localhost:8765/print \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ci-smoke-token" \
            -d '{"template":"simple-text","fields":{"text":"CI Smoke"}}'
          docker exec label-test sh -c 'test -s /tmp/output.bin'
          docker stop label-test
      # When the app crashes on startup the smoke test only sees "connection refused",
      # which says nothing about the cause. Dump the container's stdout/stderr on failure
      # so the traceback (e.g. a builder/runtime Python drift breaking the venv) is visible
      # in the CI log without having to reproduce the build locally.
      - name: Container logs on failure
        if: failure()
        run: docker logs label-test

  template-validation:
    name: Template validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --no-dev
      - name: Validate all templates
        run: |
          uv run python -c "
          from pathlib import Path
          from app.loader import TemplateRegistry, TemplateLoadError
          reg = TemplateRegistry(Path('templates'))
          names = reg.load_all()
          print(f'Loaded {len(names)} templates: {names}')
          if not names:
              raise SystemExit('No templates loaded!')
          "

  license-check:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --group license --no-dev
      - name: Check for AGPL and unclassified licenses
        run: |
          uv run pip-licenses --format=csv --output-file=/tmp/licenses.csv
          uv run python -c "
          import csv, sys
          # brother_ql_next is GPL-3.0; allow it explicitly
          ALLOWLIST = {'brother-ql-next'}
          DENYLIST = ['GNU Affero General Public License v3 (AGPLv3)', 'AGPL', 'UNKNOWN']
          failures = []
          with open('/tmp/licenses.csv') as f:
              for row in csv.DictReader(f):
                  if row.get('Name', '').lower() in ALLOWLIST:
                      continue
                  lic = row.get('License', '')
                  if any(d.lower() in lic.lower() for d in DENYLIST):
                      failures.append(f\"{row['Name']} {row['Version']}: {lic}\")
          if failures:
              print('DENIED licenses found:')
              for f in failures:
                  print(f'  {f}')
              sys.exit(1)
          print('License check passed.')
          "

  commit-lint:
    name: Conventional commit PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

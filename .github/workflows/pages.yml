name: Pages

# Publishes the static site (landing + brand guidelines) from site/ to GitHub Pages.
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Deploy-only job: it never pushes with git, so don't leave GITHUB_TOKEN in
          # .git/config where it could ride along into an uploaded artifact (zizmor: artipacked).
          persist-credentials: false
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@v4

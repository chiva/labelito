name: Pages

# Publishes the static site (landing + brand guidelines + label gallery) from site/ to GitHub Pages.
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".
#
# The gallery's per-template preview PNGs + manifest.json are NOT committed — they are rendered here
# by scripts/build_gallery.py (the same render path the live /preview endpoint uses) so the gallery
# can never drift from templates/. That render needs the DejaVu fonts and the icon collections, so
# this job provisions them the same way the CI "icons" job does before building the site artifact.

on:
  push:
    branches: [main]
    # Templates and the render/build code feed the generated gallery, so a change to any of them must
    # redeploy the site even when nothing under site/ changed.
    paths:
      - "site/**"
      - "templates/**"
      - "scripts/build_gallery.py"
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Deploy-only job: it never pushes with git, so don't leave GITHUB_TOKEN in
          # .git/config where it could ride along into an uploaded artifact (zizmor: artipacked).
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Node + corepack pnpm mirror the Dockerfile `icons` build stage so the fetched layout matches.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - run: corepack enable
      # cairosvg icon rasterization and the label text share the render stack, which needs DejaVu.
      - name: Install system fonts
        run: sudo apt-get install -y fonts-dejavu-core
      - name: Fetch icon collections
        run: bash scripts/fetch-icons.sh
      - run: uv sync
      - name: Render label gallery previews
        run: uv run python scripts/build_gallery.py
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site/
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

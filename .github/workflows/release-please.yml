name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # JSON for the open release PR (empty when there is none) — consumed by update-lock.
      pr: ${{ steps.release.outputs.pr }}
      # "true" only on the push that actually publishes a release — gates the docker job.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          release-type: python

  # release-please bumps pyproject.toml's version but never regenerates uv.lock, so the lockfile's
  # own package entry drifts behind the release. Re-lock on the release PR branch so the version bump
  # and the lockfile land in the same PR (and the CI `lock` guard stays green on merge).
  update-lock:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ fromJson(needs.release-please.outputs.pr).headBranchName }}

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv lock
      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --staged --quiet || git commit -m "chore: sync uv.lock for release"
          git push

  # When release-please publishes a release, build and push the image in the SAME run. The default
  # GITHUB_TOKEN cannot trigger a separate release-triggered workflow (GitHub suppresses events from
  # the built-in token to prevent loops), but it CAN push to GHCR — so building here needs no PAT or
  # App token. metadata-action is fed the release tag explicitly because this job runs on a push to
  # `main`, where the ref carries no tag to derive the version from.
  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # Keyless Sigstore signing: GitHub's OIDC token is the signing identity for both the
      # cosign signature and the build-provenance attestation (no long-lived key to store).
      id-token: write
      # Lets actions/attest-build-provenance record the signed attestation against the repo.
      attestations: write

    steps:
      # Build exactly the code that was tagged.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          # Deploy-only: builds/signs the image, never pushes with git (unlike update-lock above).
          persist-credentials: false

      - name: Verify tag exists
        run: test -n "${{ needs.release-please.outputs.tag_name }}"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # QEMU emulates the arm64 build (Home Assistant / Raspberry Pi hosts). The icons stage is
      # pinned to $BUILDPLATFORM in the Dockerfile, so only the Python stages run emulated.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # BuildKit's own (unsigned) in-toto attestations, embedded in the image index. The
          # signed, transparency-logged layers below are what `gh`/`cosign` actually verify.
          provenance: true
          sbom: true

      # Signed SLSA build provenance — binds the image digest to this workflow via Sigstore and
      # records it in the Rekor transparency log + GHCR. Verify with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # cosign keyless signature over the same digest — the signature format Kubernetes admission
      # controllers (Kyverno, sigstore policy-controller) verify. Reuses the GHCR login above.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image (keyless)
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_DIGEST}"

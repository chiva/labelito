    <clipPath id="clip">
      <path d="M17 6 H83 A11 11 0 0 1 94 17 V63 A11 11 0 0 1 83 74 H17 A11 11 0 0 1 6 63 V17 A11 11 0 0 1 17 6 Z"/>

services:
  labelito:
    build: .
    image: ghcr.io/chiva/labelito:latest
    container_name: labelito
    restart: unless-stopped
    # Run non-root. The image already defaults to uid 1000 (the `app` user); this makes it explicit
    # and overridable. The host ./data dir must be writable by this uid — uid 1000 matches the
    # image's default. To run as the invoking host user instead:
    #   UID=$(id -u) GID=$(id -g) docker compose up   (or set UID/GID in .env)
    user: "${UID:-1000}:${GID:-1000}"
    # Run a single worker only. Do not override the image CMD to add `--workers N`: print
    # serialization is an in-process lock and de-duplication uses an in-process history store (a
    # single SQLite connection), so multiple workers would race both and print duplicate labels.
    # See the Dockerfile CMD note.
    ports:
      - "8765:8765"
    volumes:
      # templates/ and translations/ are OVERRIDE/EXTENSION slots, not the primary store: the image
      # bakes the shipped examples at /app/examples/{templates,translations} (outside these volumes),
      # so these mounts may be empty or omitted and the examples still load. Files here win over a
      # bundled example of the same internal name/language; new files here are added. (This repo mounts
      # its own copies read-only, which simply match the baked examples.)
      - ./templates:/app/templates:ro
      - ./translations:/app/translations:ro
      - ./assets/icons:/app/assets/icons:ro
      - ./fonts:/app/fonts:ro
      - ./data:/app/data
    environment:
      MODEL: QL-810W
      # Transport is inferred from the PRINTER_URI scheme: tcp:// → network, usb:// → usb.
      PRINTER_URI: tcp://192.168.1.100:9100
      DEFAULT_LANGUAGE: en  # label chrome language; per-request `language` overrides it
      # Job history backs /reprint and idempotency de-dup. The code default is `memory` (resets on
      # restart); `file` is selected here because this service has a persistent ./data bind and
      # `restart: unless-stopped` would otherwise drop duplicate protection on every restart.
      # Set `disabled` to turn off reprint + dedup entirely. See docs/known-limitations.md.
      HISTORY_MODE: file  # durable SQLite at /app/data/history.db
      # Update check: OFF in the code default (no unsolicited egress from a bare install); enabled
      # here because Docker Compose is the primary, network-connected deployment. The About modal
      # then flags a newer release (GitHub release API, cached ~6h). Set "false" for air-gapped hosts.
      UPDATE_CHECK_ENABLED: "true"
      # HISTORY_KEEP_ENTRIES: "1000"      # rows kept after a prune
      # HISTORY_PRUNE_AT_ENTRIES: "1500"  # prune triggers once the table exceeds this
      # HISTORY_UI: "false"  # hide the /history browse page + list/delete (reprint-by-id still works)
      # In-browser template studio (all off/limited by default):
      # EDITOR_ENABLED: "true"      # expose GET /editor + draft-preview/parse/load/save routes
      # TEMPLATES_WRITABLE: "true"  # also allow POST /templates server-save (needs a writable templates
      #   mount: drop the ':ro' from the ./templates volume above AND ensure the host dir is writable by
      #   this uid/gid — otherwise the app warns at boot and the save route returns a config-aware 500)
      # TEMPLATES_LOADABLE: "false" # default true: hide the "Load existing template" picker + 404 its source route
      # MCP server for AI clients (off by default). Mounts /mcp behind the same auth as the API:
      # MCP_ENABLED: "true"   # expose the Model Context Protocol server at /mcp (read-only tools)
      # MCP_WRITABLE: "true"  # also expose the print/reprint tools (needs MCP_ENABLED). See docs/mcp.md
      # Auth — no default secret is shipped; the service refuses to start unless ONE is set:
      #   put API_TOKEN=<your-secret> in a .env file beside this compose file (auto-loaded), OR
      #   comment the line below and set WEB_AUTH_USER/WEB_AUTH_PASSWORD for a browser login wall
      #     (HTTP Basic — protects the whole UI without a reverse proxy), OR
      #   comment the line below and uncomment ALLOW_UNAUTHENTICATED for trusted-intranet open mode.
      # Over plain HTTP both credentials travel in the clear — the bearer API_TOKEN (Authorization
      # header) and the Basic WEB_AUTH_* pair alike — so front with TLS or a reverse proxy off a
      # trusted LAN. ALLOW_UNAUTHENTICATED sends no credential, so this caveat doesn't apply to it.
      # Behind a TLS-terminating reverse proxy (Traefik, nginx, Caddy…), trust ITS source IP so
      # redirects/URLs stay https. Set this to the address labelito sees the proxy connect from —
      # its container subnet, or the bridge gateway. Do NOT trust a range that a direct client can
      # reach: if you enable this, drop the `ports: 8765:8765` publish above and reach labelito only
      # through the proxy on a shared network, else forwarded headers become spoofable.
      # See docs/reverse-proxy.md.
      # FORWARDED_ALLOW_IPS: "<proxy-subnet-or-ip>"   # e.g. 172.18.0.0/16
      # `${VAR:?msg}` makes `docker compose up` fail fast if API_TOKEN is unset or empty.
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env, or comment this and set WEB_AUTH_USER/PASSWORD or ALLOW_UNAUTHENTICATED=true}
      # WEB_AUTH_USER: me            # optional HTTP Basic auth (set both)
      # WEB_AUTH_PASSWORD: ${WEB_AUTH_PASSWORD:-}
      # ALLOW_UNAUTHENTICATED: "true"  # run open (trusted intranet / behind an auth proxy only)
    # /readyz is dependency-aware (templates, transport, history store; 503 when not serving) and
    # unauthenticated. It deliberately excludes printer reachability — see app/main.py's readyz.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/readyz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

name: address-17x54
description: Compact name/address on 17×54 mm die-cut (DK-11204 family)
label: "17x54"
rotate: 90
fields:
  required: [name]
  optional: [line1, line2]
layout:
  - {type: text, text: "{{name}}", size: 22, align: left, max_lines: 1}
  - {type: text, text: "{{line1}}", size: 18, align: left, max_lines: 1}
  - {type: text, text: "{{line2}}", size: 18, align: left, max_lines: 1}

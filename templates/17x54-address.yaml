name: address-17x54
description: Compact name/address on 17×54 mm die-cut (DK-11204 family)
label: "17x54"
rotate: 90
valign: center
fields:
  required: [name]
  optional: [line1, line2]
layout:
  - {type: text, text: "{{name}}", size: 40, align: left, bold: true, max_lines: 1}
  - {type: text, text: "{{line1}}", size: 30, align: left, max_lines: 1}
  - {type: text, text: "{{line2}}", size: 30, align: left, max_lines: 1}

name: icon-collection
description: Demo label rendering an icon from a bundled collection (FontAwesome)
label: "62"
rotate: 0
fields:
  required: [title]
  optional: [subtitle]
layout:
  # collection icons are rasterized from bundled SVGs. FontAwesome also takes a `style`
  # (solid/regular/brands); Material and Octicons need only `collection` + `name`.
  # icon + title share one row: title flexes to fill, icon reserves a fixed column on the right.
  - type: row
    align_items: center
    children:
      - {type: title, text: "{{title}}", align: left, max_lines: 2}
      - {type: icon, collection: fontawesome, style: solid, name: mug-hot, size: 90, width: 110, align: right}
  - {type: subtitle, text: "{{subtitle}}"}

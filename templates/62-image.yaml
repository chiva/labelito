name: image
description: "Image label: pick or drag-drop an image in the web UI, or POST /print with fields.image (base64 / multipart), with an optional title"
label: "62"
rotate: 0
fields:
  required: [image]
  optional: [title]
layout:
  # The `image` element's bytes come from the print request itself (base64 or a multipart
  # upload on the `image` field), NOT from a server-side file. It reads nothing from
  # assets/icons, so an `assets/icons` bind-mount can never shadow or hide it.
  - {type: spacer, size: 6}
  - {type: image, field: image, max_height: 220, align: center}
  - {type: title, text: "{{title}}", max_lines: 1, align: center}
  - {type: spacer, size: 6}

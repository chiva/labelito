name: title-subtitle-qr
description: Title, subtitle and a QR code (URL / text / wifi)
label: "62"
rotate: 0
fields:
  required: [title]
  optional: [subtitle, qr]
layout:
  - {type: spacer, size: 8}
  # Text stack on the left (a column), QR fixed-width on the right (same row), vertically centered.
  - type: row
    align_items: center
    spacing: 12
    children:
      - type: column
        children:
          - {type: title, text: "{{title}}", align: left, max_lines: 2}
          - {type: subtitle, text: "{{subtitle}}", align: left, max_lines: 2}
      - {type: qr, data: "{{qr}}", size: 160, width: 176, align: right, valign: center}
  - {type: spacer, size: 8}

name: fridge-dated
description: Fridge label — always stamps storage date automatically
label: "62"
rotate: 0
fields:
  required: [title]
  optional: [subtitle]
layout:
  - {type: spacer, size: 8}
  - {type: title, text: "{{title}}", max_lines: 2, align: center, bold: true}
  - {type: subtitle, text: "{{subtitle}}", max_lines: 1, align: center}
  - {type: line}
  - {type: text, text: "[[stored]]: {{date}}", size: 28, align: center}
  - {type: text, text: "[[expires]]: {{date+5d}}", size: 28, align: center}
  - {type: spacer, size: 8}
